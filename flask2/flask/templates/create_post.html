{% extends "base.html" %}

{% block title %}Создать пост — Wizzar{% endblock %}

{% block content %}
<div class="create-post-container">
    <h1 class="page-title">📝 Создание нового поста</h1>
    
    <form method="POST" action="{{ url_for('create_post') }}" 
          enctype="multipart/form-data" class="post-form" id="post-form" novalidate>
        
        <div class="form-group">
            <label for="title">Заголовок поста</label>
            <input type="text" id="title" name="title" required 
                   minlength="5" maxlength="50" 
                   placeholder="Введите заголовок..."
                   value="{{ title or '' }}">
            <span class="char-counter"><span id="title-count">0</span>/50</span>
        </div>
        
        <div class="form-group">
            <label for="content">Содержание поста</label>
            <textarea id="content" name="content" required 
                      minlength="20"
                      placeholder="Напишите что-нибудь интересное...">{{ content or '' }}</textarea>
            <span class="char-counter"><span id="content-count">0</span> символов (минимум 20)</span>
        </div>
        
        <!-- 🖼️ Загрузка изображения (отдельно от контента) -->
        <div class="form-group">
            <label>Изображение поста (обложка)</label>
            <div class="image-upload-area" id="image-upload-area">
                <div class="upload-placeholder">
                    <span class="upload-icon">📷</span>
                    <p>Перетащите изображение сюда или кликните для выбора</p>
                    <span class="upload-hint">PNG, JPG, GIF, WEBP до 16MB</span>
                </div>
                <input type="file" id="image" name="image" accept="image/*" hidden>
            </div>
            <div class="image-preview" id="image-preview"></div>
        </div>
        
        <!-- 🔍 Предпросмотр -->
        <div class="form-group">
            <button type="button" class="btn-secondary" id="preview-btn">👁️ Предпросмотр</button>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-primary">🚀 Опубликовать пост</button>
            <a href="{{ url_for('index') }}" class="btn-secondary">Отмена</a>
        </div>
    </form>
</div>

<!-- Модальное окно предпросмотра -->
<div class="modal" id="preview-modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>Предпросмотр</h2>
        <div id="preview-content"></div>
    </div>
</div>

<!-- ✅ Подключаем TinyMCE -->
<script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js"></script>
<script>
// Инициализация TinyMCE с тёмной темой
tinymce.init({
    selector: '#content',
    height: 450,
    menubar: false,
    branding: false,
    skin: 'oxide-dark',
    content_css: 'dark',
    plugins: 'image link table code preview lists emoticons',
    toolbar: 'undo redo | styleselect | bold italic underline strikethrough | ' +
             'alignleft aligncenter alignright alignjustify | ' +
             'bullist numlist | code preview | removeformat',
    
    // Настройки заголовков
    style_formats: [
        { title: 'Заголовок 1', format: 'h1' },
        { title: 'Заголовок 2', format: 'h2' },
        { title: 'Заголовок 3', format: 'h3' },
        { title: 'Обычный текст', format: 'p' },
        { title: 'Цитата', format: 'blockquote' },
        { title: 'Код', format: 'code' }
    ],
    
    // Обработка изображений внутри редактора
    image_title: true,
    automatic_uploads: false,
    file_picker_types: 'image',
    
    file_picker_callback: function(cb, value, meta) {
        const input = document.createElement('input');
        input.setAttribute('type', 'file');
        input.setAttribute('accept', 'image/*');
        
        input.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) {
                alert('Пожалуйста, выберите изображение');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('Изображение слишком большое (макс. 5MB)');
                return;
            }
            
            const reader = new FileReader();
            reader.addEventListener('load', function() {
                // Создаём blob для TinyMCE
                const id = 'blobid' + (new Date()).getTime();
                const blobCache = tinymce.activeEditor.editorUpload.blobCache;
                const base64 = reader.result.split(',')[1];
                
                const blobInfo = blobCache.create(id, file, base64);
                blobCache.add(blobInfo);
                
                // Возвращаем URL в редактор
                cb(blobInfo.blobUri(), { title: file.name });
            });
            reader.readAsDataURL(file);
        });
        
        input.click();
    },
    
    // Счётчик символов при изменении
    setup: function(editor) {
        editor.on('change keyup undo redo', function() {
            updateCharCount();
            autoSaveDraft();
        });
    }
});

// Счётчик символов (без HTML-тегов)
function updateCharCount() {
    const content = tinymce.get('content')?.getContent() || '';
    const text = content.replace(/<[^>]*>/g, '').trim();
    document.getElementById('content-count').textContent = text.length;
}

// Счётчик заголовка
document.getElementById('title')?.addEventListener('input', function() {
    document.getElementById('title-count').textContent = this.value.length;
});

// Автосохранение черновика в localStorage
function autoSaveDraft() {
    const title = document.getElementById('title')?.value || '';
    const content = tinymce.get('content')?.getContent() || '';
    
    if (title || content) {
        localStorage.setItem('wizzar_draft_title', title);
        localStorage.setItem('wizzar_draft_content', content);
        localStorage.setItem('wizzar_draft_time', new Date().toISOString());
    }
}

// Восстановление черновика при загрузке
window.addEventListener('DOMContentLoaded', function() {
    const savedTitle = localStorage.getItem('wizzar_draft_title');
    const savedContent = localStorage.getItem('wizzar_draft_content');
    const savedTime = localStorage.getItem('wizzar_draft_time');
    
    if (savedTitle && savedContent && savedTime) {
        const draftDate = new Date(savedTime);
        const now = new Date();
        const hoursDiff = (now - draftDate) / (1000 * 60 * 60);
        
        // Предлагаем восстановить, если черновик не старше 24 часов
        if (hoursDiff < 24) {
            const restore = confirm(`Найден черновик от ${draftDate.toLocaleString('ru-RU')}. Восстановить?`);
            if (restore) {
                document.getElementById('title').value = savedTitle;
                document.getElementById('title-count').textContent = savedTitle.length;
                
                // Ждём инициализации TinyMCE
                const checkEditor = setInterval(() => {
                    if (tinymce.get('content')) {
                        tinymce.get('content').setContent(savedContent);
                        updateCharCount();
                        clearInterval(checkEditor);
                    }
                }, 100);
            }
        }
    }
    
    // Инициализация счётчика
    updateCharCount();
});

// Загрузка обложки (отдельно от контента)
const uploadArea = document.getElementById('image-upload-area');
const fileInput = document.getElementById('image');
const imagePreview = document.getElementById('image-preview');

uploadArea?.addEventListener('click', () => fileInput?.click());

fileInput?.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/')) {
        if (file.size > 16 * 1024 * 1024) {
            alert('Файл слишком большой (макс. 16MB)');
            this.value = '';
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            imagePreview.innerHTML = `
                <div class="preview-image">
                    <img src="${e.target.result}" alt="Preview">
                    <button type="button" class="remove-image" onclick="removeImage()">×</button>
                </div>
            `;
            uploadArea.style.display = 'none';
        };
        reader.readAsDataURL(file);
    }
});

function removeImage() {
    fileInput.value = '';
    imagePreview.innerHTML = '';
    uploadArea.style.display = 'block';
}

// Предпросмотр поста
document.getElementById('preview-btn')?.addEventListener('click', function() {
    const title = document.getElementById('title')?.value || 'Без заголовка';
    const content = tinymce.get('content')?.getContent() || '';
    
    document.getElementById('preview-content').innerHTML = `
        <h2 style="color: #ffa652; margin-bottom: 1rem;">${title}</h2>
        <div style="line-height: 1.8; color: #e0e0ff;">${content}</div>
    `;
    
    document.getElementById('preview-modal').style.display = 'block';
});

document.querySelector('.close-modal')?.addEventListener('click', function() {
    document.getElementById('preview-modal').style.display = 'none';
});

// Закрытие модального окна по клику вне контента
window.addEventListener('click', function(e) {
    const modal = document.getElementById('preview-modal');
    if (e.target === modal) {
        modal.style.display = 'none';
    }
});

// Очистка черновика после успешной отправки
document.getElementById('post-form')?.addEventListener('submit', function() {
    // Не очищаем сразу — даём серверу время обработать
    setTimeout(() => {
        localStorage.removeItem('wizzar_draft_title');
        localStorage.removeItem('wizzar_draft_content');
        localStorage.removeItem('wizzar_draft_time');
    }, 1000);
});
</script>

<style>
/* Контейнер */
.create-post-container {
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 2rem;
}

/* Форма */
.post-form {
    background: rgba(30, 30, 60, 0.7);
    backdrop-filter: blur(10px);
    padding: 2.5rem;
    border-radius: 20px;
    border: 1px solid #3a3a5a;
    box-shadow: 0 10px 30px rgba(255, 107, 53, 0.25);
}

/* Группы полей */
.form-group {
    margin-bottom: 1.8rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.6rem;
    color: #ffa652;
    font-weight: 600;
    font-size: 1.1rem;
}

/* Поля ввода */
.form-group input[type="text"] {
    width: 100%;
    padding: 12px 15px;
    border-radius: 12px;
    border: 2px solid #3a3a5a;
    background: rgba(30, 30, 60, 0.6);
    color: white;
    font-size: 1rem;
    font-family: 'Exo 2', sans-serif;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

.form-group input[type="text"]:focus {
    border-color: #ff6b35;
    box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.3);
    outline: none;
}

/* Счётчик символов */
.char-counter {
    display: block;
    text-align: right;
    font-size: 0.85rem;
    color: #888;
    margin-top: 0.4rem;
}

/* Загрузка изображения */
.image-upload-area {
    border: 2px dashed #3a3a5a;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(30, 30, 60, 0.4);
}

.image-upload-area:hover,
.image-upload-area.drag-over {
    border-color: #ff6b35;
    background: rgba(255, 107, 53, 0.1);
}

.upload-placeholder {
    color: #b0b0d0;
}

.upload-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 1rem;
}

.upload-hint {
    font-size: 0.85rem;
    color: #6a6a8a;
    display: block;
    margin-top: 0.5rem;
}

.image-preview {
    margin-top: 1rem;
}

.preview-image {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    max-width: 100%;
}

.preview-image img {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    border: 2px solid #ffa652;
    border-radius: 12px;
}

.remove-image {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255, 71, 87, 0.9);
    color: white;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.remove-image:hover {
    background: #ff4757;
    transform: scale(1.1);
}

/* Кнопки действий */
.form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2.5rem;
    flex-wrap: wrap;
}

.btn-primary,
.btn-secondary {
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    border: none;
    font-size: 1.05rem;
    transition: all 0.3s ease;
    white-space: nowrap;
}

.btn-primary {
    background: linear-gradient(45deg, #ff6b35, #ffa652);
    color: white;
    flex: 1;
    min-width: 180px;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255, 107, 53, 0.5);
}

.btn-secondary {
    background: transparent;
    border: 2px solid #ffa652;
    color: white;
}

.btn-secondary:hover {
    background: rgba(255, 166, 82, 0.15);
    transform: translateY(-2px);
}

/* Модальное окно предпросмотра */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 2000;
    overflow-y: auto;
    padding: 2rem;
}

.modal-content {
    background: #1a1a2e;
    margin: 2rem auto;
    padding: 2rem;
    border-radius: 20px;
    max-width: 800px;
    border: 1px solid #ffa652;
    position: relative;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
}

.close-modal {
    position: absolute;
    top: 1rem;
    right: 1.5rem;
    font-size: 2rem;
    color: #b0b0d0;
    cursor: pointer;
    transition: color 0.2s;
}

.close-modal:hover {
    color: #ff6b35;
}

#preview-content {
    margin-top: 1.5rem;
    line-height: 1.8;
}

/* Адаптивность */
@media (max-width: 768px) {
    .create-post-container {
        padding: 0 1rem;
    }
    
    .post-form {
        padding: 1.8rem;
    }
    
    .form-actions {
        flex-direction: column;
    }
    
    .btn-primary,
    .btn-secondary {
        width: 100%;
    }
    
    .modal-content {
        margin: 1rem;
        padding: 1.5rem;
    }
}

/* Стили для TinyMCE (переопределение) */
.tox-tinymce {
    border-radius: 12px !important;
    border: 2px solid #3a3a5a !important;
}

.tox-tinymce:focus-within {
    border-color: #ff6b35 !important;
    box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.3) !important;
}

.tox-toolbar {
    background: #1e1e3a !important;
    border-color: #3a3a5a !important;
}

.tox-statusbar {
    background: #1e1e3a !important;
    border-color: #3a3a5a !important;
    color: #888 !important;
}
</style>
{% endblock %}
